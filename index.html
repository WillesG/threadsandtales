<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DM Toolkit">
<meta name="theme-color" content="#1a1a2e">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Threads And Tales</title>
<link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--sbg:#1a1a2e;--sbgh:#25254a;--sbga:#2d2d5e;--bg:#f7f5f0;--card:#fff;--inp:#faf9f6;--tx:#2c2c2c;--tx2:#6b6b6b;--txs:#c8c8d8;--txsb:#eeeef6;--ac:#8b5e3c;--acl:#c49a6c;--ach:#a0724e;--acbg:#f5ede4;--bd:#e0ddd6;--bdl:#eae7e0;--dg:#c0392b;--ok:#27ae60}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;position:fixed;font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
#root{height:100%;width:100%}
.app{display:flex;height:100vh;width:100vw;overflow:hidden}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:300px;background:var(--sbg);display:flex;flex-direction:column;overflow:hidden;transition:transform .25s ease;z-index:30}
.sidebar.closed{transform:translateX(-100%)}
.sb-bk{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:25}
.sb-hd{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-hd h1{font-family:'Alegreya',serif;font-size:18px;font-weight:700;color:var(--acl);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-x{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:none;background:rgba(255,255,255,.08);border-radius:7px;color:var(--txs);cursor:pointer;flex-shrink:0}
.sb-x:hover{background:rgba(255,255,255,.15);color:var(--txsb)}
.sb-sr{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-si{display:flex;align-items:center;background:rgba(255,255,255,.07);border-radius:8px;padding:0 10px;gap:8px}
.sb-si input{flex:1;background:none;border:none;color:var(--txsb);font-size:14px;padding:9px 0;outline:none;font-family:inherit}
.sb-si input::placeholder{color:rgba(200,200,216,.35)}
.sb-sc{flex:1;overflow-y:auto;scrollbar-width:thin}
.sb-sec{border-bottom:1px solid rgba(255,255,255,.06)}
.sec-h{display:flex;align-items:center;gap:7px;padding:10px 14px;cursor:pointer;color:var(--txs);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.1px;user-select:none}
.sec-h:hover{color:var(--txsb)}
.sec-h .ar{transition:transform .2s;display:flex}
.sec-h.open .ar{transform:rotate(90deg)}
.sec-h .bd{margin-left:auto;background:rgba(255,255,255,.08);padding:1px 6px;border-radius:10px;font-size:10px}
.sb-add{display:flex;align-items:center;gap:5px;padding:6px 14px 6px 26px;cursor:pointer;color:var(--acl);font-size:12px;opacity:.7;border:none;background:none;font-family:inherit;width:100%}
.sb-add:hover{opacity:1}
.sb-it{display:flex;align-items:center;gap:7px;padding:9px 14px 9px 26px;cursor:pointer;color:var(--txs);font-size:13px;min-height:42px;border-left:3px solid transparent;transition:all .12s}
.sb-it:hover{background:var(--sbgh);color:var(--txsb)}
.sb-it.act{background:var(--sbga);color:var(--acl);border-left-color:var(--acl)}
.sb-it .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-it .ic{flex-shrink:0;opacity:.6}
.sb-it.dim{opacity:.45}
.sb-it.dim:hover{opacity:.7}
.st-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.st-flt{display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.st-flt label{font-size:11px;color:var(--txs);flex:1;cursor:pointer;user-select:none}
.st-flt input[type="checkbox"]{accent-color:var(--acl);cursor:pointer}
.det-st{display:flex;align-items:center;gap:8px;margin-top:10px;margin-bottom:4px}
.det-st label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--tx2)}
.det-st select{padding:5px 8px;border:1px solid var(--bd);border-radius:6px;font-size:12px;font-family:inherit;color:var(--tx);background:var(--inp);outline:none}
.det-st select:focus{border-color:var(--ac)}
.tree-it{padding-left:calc(26px + var(--d,0) * 18px)}
.tr-ar{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;opacity:.5;transition:transform .2s}
.tr-ar:hover{opacity:1}
.tr-ar.exp{transform:rotate(90deg)}
.tr-ar.hid{opacity:0;pointer-events:none}
.tag{font-size:9px;padding:2px 5px;border-radius:3px;text-transform:uppercase;font-weight:600;letter-spacing:.4px;flex-shrink:0}
.tag-combat{background:rgba(231,76,60,.15);color:#e74c3c}
.tag-social{background:rgba(52,152,219,.15);color:#3498db}
.tag-event{background:rgba(155,89,182,.15);color:#9b59b6}
.tag-loc{background:rgba(139,94,60,.12);color:var(--ac)}
.tag-mon{background:rgba(220,38,38,.12);color:#dc2626}
.ct{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;min-width:0;position:relative}
.tb{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--card);border-bottom:1px solid var(--bd);min-height:50px;flex-shrink:0;position:relative;z-index:2}
.tb-b{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:none;background:none;cursor:pointer;border-radius:7px;color:var(--tx2);transition:all .15s;flex-shrink:0}
.tb-b:hover{background:var(--acbg);color:var(--ac)}
.tb-b.on{background:var(--ac);color:#fff}
.tb-t{flex:1;font-family:'Alegreya',serif;font-size:16px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border:none;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;min-height:36px;white-space:nowrap;transition:all .15s}
.btn-p{background:var(--ac);color:#fff}.btn-p:hover{background:var(--ach)}
.btn-s{background:var(--acbg);color:var(--ac)}.btn-s:hover{background:#ecdcc8}
.btn-d{background:#fde8e5;color:var(--dg)}.btn-d:hover{background:#f9d0cb}
.btn-sm{padding:5px 8px;font-size:11px;min-height:28px}
.btn-g{background:none;color:var(--tx2)}.btn-g:hover{background:rgba(0,0,0,.04)}
.ct-sc{flex:1;overflow-y:auto;padding:20px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:32px;color:var(--tx2)}
.welcome h2{font-family:'Alegreya',serif;font-size:26px;color:var(--tx);margin-bottom:10px}
.welcome p{font-size:15px;max-width:380px;line-height:1.6;margin-bottom:20px}
.det{max-width:780px}
.det-tp{font-size:10px;text-transform:uppercase;letter-spacing:1.1px;font-weight:600;color:var(--ac);margin-bottom:6px}
.det-nm{font-family:'Alegreya',serif;font-size:26px;font-weight:700;color:var(--tx);border:none;border-bottom:2px solid transparent;background:none;width:100%;padding:3px 0;outline:none}
.det-nm:focus{border-bottom-color:var(--ac)}
.fld{margin-top:16px}
.fld-l{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--tx2);margin-bottom:5px}
.fld-ta{width:100%;min-height:120px;padding:10px 12px;border:1px solid var(--bd);border-radius:7px;background:var(--inp);font-family:inherit;font-size:14px;line-height:1.6;color:var(--tx);resize:vertical;outline:none}
.fld-ta:focus{border-color:var(--ac)}
.fld-sel{padding:7px 10px;border:1px solid var(--bd);border-radius:7px;background:var(--inp);font-size:13px;color:var(--tx);outline:none;font-family:inherit}
.fld-sel:focus{border-color:var(--ac)}
.fld-in{padding:7px 10px;border:1px solid var(--bd);border-radius:7px;background:var(--inp);font-size:13px;color:var(--tx);outline:none;font-family:inherit;width:100%}
.fld-in:focus{border-color:var(--ac)}
.det-act{display:flex;gap:7px;margin-top:20px;padding-top:16px;border-top:1px solid var(--bdl);flex-wrap:wrap}
.sg{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:6px}
.sb2{background:var(--inp);border:1px solid var(--bd);border-radius:6px;padding:6px;text-align:center}
.sb2 label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--tx2);margin-bottom:2px}
.sb2 input{width:100%;text-align:center;border:none;background:none;font-size:15px;font-weight:600;color:var(--tx);outline:none;font-family:inherit}
.sr{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.sm{background:var(--inp);border:1px solid var(--bd);border-radius:6px;padding:5px 8px;display:flex;align-items:center;gap:5px}
.sm label{font-size:10px;font-weight:600;color:var(--tx2);white-space:nowrap}
.sm input{width:50px;border:none;background:none;font-size:13px;font-weight:500;color:var(--tx);outline:none;font-family:inherit}
.nr{display:flex;align-items:flex-start;gap:7px;padding:5px 0}
.nr .bul{width:5px;height:5px;border-radius:50%;background:var(--ac);margin-top:9px;flex-shrink:0}
.nr input{flex:1;border:none;border-bottom:1px solid var(--bdl);background:none;font-size:14px;font-family:inherit;color:var(--tx);padding:3px 0;outline:none}
.nr input:focus{border-bottom-color:var(--ac)}
.anr{display:flex;gap:7px;margin-top:10px;align-items:center}
.anr input{flex:1;padding:9px 10px;border:1px dashed var(--bd);border-radius:7px;background:var(--inp);font-size:13px;font-family:inherit;color:var(--tx);outline:none}
.anr input:focus{border-color:var(--ac);border-style:solid}
.pk{position:relative;margin-top:4px}
.pk-in{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:7px;background:var(--inp);font-size:13px;color:var(--tx);outline:none;font-family:inherit}
.pk-in:focus{border-color:var(--ac)}
.pk-dd{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--bd);border-top:none;border-radius:0 0 7px 7px;max-height:180px;overflow-y:auto;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.pk-op{padding:8px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;transition:background .1s}
.pk-op:hover{background:var(--acbg)}
.pk-op .po-n{flex:1}
.pk-op .po-t{font-size:10px;color:var(--tx2);text-transform:uppercase}
.pk-em{padding:10px 12px;color:var(--tx2);font-size:12px;font-style:italic}
.pk-cur{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--acbg);border-radius:6px;margin-top:4px}
.pk-cur .pc-n{flex:1;font-size:13px;color:var(--ac);cursor:pointer}
.pk-cur .pc-n:hover{text-decoration:underline}
.pk-cur .pc-x{background:none;border:none;cursor:pointer;color:var(--tx2);padding:2px;display:flex}
.pk-cur .pc-x:hover{color:var(--dg)}
.ch-ls{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.ch{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;background:var(--acbg);border-radius:5px;font-size:12px;color:var(--ac)}
.ch .cn{cursor:pointer}.ch .cn:hover{text-decoration:underline}
.ch .cx{background:none;border:none;cursor:pointer;color:var(--tx2);padding:0;display:flex;font-size:10px}.ch .cx:hover{color:var(--dg)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.mo-bx{background:var(--card);border-radius:14px;width:100%;max-width:620px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.2)}
.mo-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd)}
.mo-hd h2{font-family:'Alegreya',serif;font-size:20px;font-weight:700}
.mo-bd{padding:20px;overflow-y:auto;flex:1}
.mo-ft{padding:12px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:7px}
.imp-ta{width:100%;min-height:160px;padding:10px;border:1px solid var(--bd);border-radius:7px;font-family:monospace;font-size:12px;resize:vertical;outline:none;background:var(--inp);color:var(--tx)}
.imp-ta:focus{border-color:var(--ac)}
.f-dr{border:2px dashed var(--bd);border-radius:10px;padding:24px;text-align:center;color:var(--tx2);cursor:pointer;margin-bottom:12px}
.f-dr:hover{border-color:var(--ac);background:var(--acbg)}
.or-d{text-align:center;font-size:11px;color:var(--tx2);margin:12px 0;text-transform:uppercase;letter-spacing:.8px}
.exp-pre{padding:12px 16px;background:var(--inp);border-radius:8px;margin-bottom:12px;font-size:13px;line-height:1.5;color:var(--tx2)}
.exp-pre strong{color:var(--tx)}
.exp-fn{display:flex;gap:8px;align-items:center}
.exp-fn input{flex:1;padding:9px 12px;border:1px solid var(--bd);border-radius:7px;font-size:14px;font-family:inherit;color:var(--tx);outline:none;background:var(--inp)}
.exp-fn input:focus{border-color:var(--ac)}
.exp-fn .ext{font-size:14px;color:var(--tx2);font-weight:500}
.err{color:var(--dg);font-size:12px;margin-top:7px;padding:7px 10px;background:#fde8e5;border-radius:5px}
.okmsg{color:var(--ok);font-size:12px;margin-top:7px;padding:7px 10px;background:#e8f8ef;border-radius:5px}
.sg-l{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--txs);opacity:.5;padding:7px 14px 3px}
.mg-sum{padding:10px 14px;background:var(--acbg);border-radius:8px;margin-bottom:12px;font-size:13px;line-height:1.6}
.mg-sum strong{color:var(--ac)}
.mg-sec{margin-bottom:12px}
.mg-sec-t{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--tx2);margin-bottom:6px;padding-top:8px;border-top:1px solid var(--bdl)}
.mg-it{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;margin-bottom:3px;font-size:13px}
.mg-it.match{background:#fff8e6}
.mg-it.new-it{background:#f0fdf4}
.mg-it label{flex:1;cursor:pointer;display:flex;align-items:center;gap:6px}
.mg-it input[type="checkbox"]{width:16px;height:16px;accent-color:var(--ac);cursor:pointer;flex-shrink:0}
.mg-mb{font-size:10px;padding:1px 6px;border-radius:3px;background:#fbbf24;color:#78350f;font-weight:600}
.mg-nb{font-size:10px;padding:1px 6px;border-radius:3px;background:#86efac;color:#14532d;font-weight:600}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:500;z-index:200;animation:sUp .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.toast-ok{background:var(--ok);color:#fff}
.toast-err{background:var(--dg);color:#fff}
@keyframes sUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.st-ct{position:absolute;top:50px;left:0;right:0;bottom:0;display:flex;overflow:hidden}
.st-w{flex:1;position:relative;overflow:hidden;background:#1b1b2f;cursor:grab}
.st-w.pan{cursor:grabbing}
.st-cv{position:absolute;top:0;left:0;transform-origin:0 0}
.sn-nd{position:absolute;width:210px;min-height:70px;border-radius:10px;padding:11px 12px;cursor:grab;user-select:none;border-width:2px;border-style:solid;display:flex;flex-direction:column;gap:3px;touch-action:none;color:#1e1e2e}
.sn-nd:hover{box-shadow:0 4px 20px rgba(0,0,0,.3)}
.sn-nd.sel{box-shadow:0 0 0 3px rgba(196,154,108,.5)}
.sn-ti{font-family:'Alegreya',serif;font-size:14px;font-weight:700;line-height:1.3}
.sn-tp{font-size:9px;text-transform:uppercase;letter-spacing:.7px;font-weight:600;opacity:.65}
.sn-ds{font-size:11px;line-height:1.3;opacity:.7;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.sn-dt{position:absolute;top:-7px;right:-7px;width:16px;height:16px;border-radius:50%;border:2px solid #1b1b2f}
.sn-pt{position:absolute;width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);cursor:crosshair;z-index:5;transition:all .15s;opacity:0}
.sn-nd:hover .sn-pt,.sn-nd.sel .sn-pt{opacity:1}
.sn-pt:hover{background:rgba(196,154,108,.6);border-color:rgba(196,154,108,.9);transform:scale(1.3)}
.sn-pt.pt-t{top:-7px;left:50%;margin-left:-7px}
.sn-pt.pt-b{bottom:-7px;left:50%;margin-left:-7px}
.sn-pt.pt-l{left:-7px;top:50%;margin-top:-7px}
.sn-pt.pt-r{right:-7px;top:50%;margin-top:-7px}
.sn-pt.pact{opacity:1;background:rgba(196,154,108,.6);border-color:#c49a6c}
.st-tb{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:5px;background:rgba(27,27,47,.92);padding:7px 10px;border-radius:9px;border:1px solid rgba(255,255,255,.08);z-index:5}
.st-tb button{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.07);border:none;border-radius:6px;color:rgba(255,255,255,.6);cursor:pointer}
.st-tb button:hover{background:rgba(255,255,255,.14);color:#fff}
.st-tb .sep{width:1px;background:rgba(255,255,255,.1);margin:2px 3px}
.st-em{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.35);text-align:center;gap:10px;padding:40px}
.st-em h3{font-family:'Alegreya',serif;font-size:22px;color:rgba(255,255,255,.55)}
.insp{width:260px;min-width:260px;background:#16162a;border-left:1px solid rgba(255,255,255,.08);padding:14px;overflow-y:auto;color:#ddd;display:flex;flex-direction:column;gap:10px}
.insp-hd{display:flex;justify-content:space-between;align-items:center}
.insp-l{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.35);font-weight:600;display:block;margin-bottom:3px}
.insp input,.insp select,.insp textarea{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#fff;border-radius:6px;padding:7px 9px;font-size:13px;outline:none;font-family:inherit;width:100%}
.insp select option{background:#1e1e3a;color:#fff}
.insp textarea{min-height:70px;resize:vertical;font-size:12px;line-height:1.5}
.insp input:focus,.insp select:focus,.insp textarea:focus{border-color:rgba(196,154,108,.5)}
.edge-del{cursor:pointer;pointer-events:all}
.edge-del:hover circle{fill:#c0392b}
@media(max-width:768px){.insp{width:200px;min-width:200px}}
/* ═══ Rich Encounter Sections ═══ */
.enc-box{margin-top:16px;padding:14px 16px;border-radius:9px;background:linear-gradient(135deg,#fdf6e3,#f5eed8);border:1px solid #e0d5b7;position:relative}
.enc-box-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#8b7355;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.enc-box p{font-family:'Alegreya',serif;font-style:italic;font-size:15px;line-height:1.7;color:#4a3f2f;margin:0;white-space:pre-wrap}
.enc-dm{margin-top:16px;border-radius:9px;border:1px solid var(--bd);overflow:hidden}
.enc-dm-h{display:flex;align-items:center;gap:6px;padding:10px 14px;cursor:pointer;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--tx2);background:var(--inp);user-select:none}
.enc-dm-h:hover{background:#f0ede6}
.enc-dm-h .ar2{transition:transform .2s;display:inline-flex}.enc-dm-h.open .ar2{transform:rotate(90deg)}
.enc-dm-bd{padding:12px 16px;background:#faf9f6;border-top:1px solid var(--bdl);font-size:14px;line-height:1.6;color:var(--tx);white-space:pre-wrap}
.enc-ph{margin-top:16px}
.enc-ph-l{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--tx2);margin-bottom:8px}
.enc-ph-s{counter-reset:phase}

      <div style={{display:"flex",gap:6,flexShrink:0}}><button className="btn btn-s" onClick={function(){sSe2(true)}}><IDn/> Export</button><button className="btn btn-s" onClick={function(){sSi(true)}}><IUp/> Import</button></div>
    </div>
    {vw==="storyline"?<StoryView nodes={da.storyNodes} edges={da.storyEdges} setNodes={function(fn){sDA(function(p){return Object.assign({},p,{storyNodes:typeof fn==="function"?fn(p.storyNodes):fn})})}} setEdges={function(fn){sDA(function(p){return Object.assign({},p,{storyEdges:typeof fn==="function"?fn(p.storyEdges):fn})})}} data={da} onNav={nav} showT={shT} onCreateEnc={crInline} onSyncEnc={syncEnc}/>
    :vw==="party"?<PartyView party={da.party} onUpdate={updateParty}/>
    :<div className="ct-sc">{!sEnt?<div className="welcome"><h2>Welcome, Dungeon Master</h2><p>{da.locations&&da.locations.length>0?"Select an entry from the sidebar, or switch to Storyline view.":"Import adventure data or add entries to get started."}</p>{(!da.locations||da.locations.length===0)&&<button className="btn btn-p" onClick={function(){sSi(true)}}><IUp/> Import</button>}{da.locations&&da.locations.length>0&&<div style={{color:"var(--tx2)",fontSize:13,marginTop:6}}>{da.locations.length} loc · {(da.npcs||[]).length} NPCs · {(da.encounters||[]).length} enc · {(da.monsters||[]).length} mon · {(da.party||[]).length} PCs</div>}</div>
    :sl.type==="sessions"?<SesDet session={sEnt} onSave={hSave} onDel={hDel}/>
    :<EntDet type={sl.type} entity={sEnt} data={da} onSave={hSave} onNav={nav} onDel={hDel} onCr={crInline}/>}</div>}
    </div>
  </div>
  <CombatPanel open={cbt} onClose={function(){sCbt(false)}} party={da.party} its={cIts} sIts={sCIts} rnd={cRnd} sRnd={sCRnd} act={cAct} sAct={sCAct} fxs={cFxs} sFxs={sCFxs}/>
  {se2&&<ExpMo onClose={function(){sSe2(false)}} onDone={function(){shT("Exported")}}/>}
  {si&&<ImpMo onClose={function(){sSi(false)}} onImp={hImp} onMerge={hMerge} data={da}/>}
  {to&&<Toast key={to.key} msg={to.msg} type={to.type} onDone={function(){sTo(null)}}/>}
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
